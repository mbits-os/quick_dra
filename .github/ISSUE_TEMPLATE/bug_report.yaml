name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug", "needs triage"]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens.
    validations:
      required: false
  - type: input
    id: reproduction
    attributes:
      label: Reproduction Rate
      description: What percentage of the time does it reproduce?
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: Which version of Project Flow was used?
      options:
        - Current (v1.7.0)
        - Previous (v1.6.0)
        - Older, than v1.6.0
        - Other, e.g. main branch
    validations:
      required: true
  - type: checkboxes
    id: os
    attributes:
      label: Operating Systems
      description: Which operating systems have you used? You may select more than one.
      options:
        - label: macOS
        - label: Windows
        - label: Linux
        - label: Other
    validations:
      required: false
  - type: checkboxes
    id: compiler
    attributes:
      label: Compilers
      description: Which compilers have you used? You may select more than one.
      options:
        - label: GCC
        - label: MSVC
        - label: Clang
        - label: Apple Clang
        - label: Other
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!

        If you selected _"Older"_ for Version, or _"Other"_ for Version, Operating Systems or Compiler, specify here,
        which was it. For Version, you can also specify tag name or commit id; if you choose to name a branch, attach
        the id of HEAD at the moment of reporting, e.g. `Tested on: main@123ffeee345`. Please be aware, however,
        that bugs should be reproduced on latest version to provide a high-quality bug description (either _Current_ or
        `main` branch if younger, than _Current_).

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
