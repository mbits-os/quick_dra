name: Clang Tidy

on:
  pull_request:
  workflow_dispatch:

jobs:
  find-changes:
    runs-on: ubuntu-latest
    name: Find code changes
    outputs:
      cpp-count: ${{ steps.changed-code.outputs.cpp-count }}
      file-list: ${{ steps.changed-code.outputs.file-list }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Changed code
        id: changed-code
        run: |
          git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} >> .file-list
          cat .file-list
          echo "cpp-count=$(egrep '\.(cpp|cc|cxx)$' .file-list | wc -l)" >> "$GITHUB_OUTPUT"
          echo "file-list=$(cat .file-list | base64 | tr --delete '\n')" >> "$GITHUB_OUTPUT"

  clang-check:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: read

    env:
      CONAN_REVISIONS_ENABLED: 1
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    runs-on: ubuntu-latest
    name: Check with clang-tidy
    needs: find-changes

    steps:
      - name: Bootstrap
        if: needs.find-changes.outputs.cpp-count != '0'
        uses: proj-flow-actions/bootstrap@v1
        with:
          cache-prefix: ubuntu
          python-version: "3.12"
          checkout: true
          submodules: true

      - name: Get changes
        if: needs.find-changes.outputs.cpp-count != '0'
        run: |
          FILE_LIST="${{ needs.find-changes.outputs.file-list }}"
          echo "$FILE_LIST" | base64 --decode > .file-list
          cat .file-list

      - name: Get sources
        if: needs.find-changes.outputs.cpp-count != '0'
        uses: ./.github/actions/configure-sources
        with:
          cache-prefix: ubuntu-Debug-gcc

      - name: Check
        if: needs.find-changes.outputs.cpp-count != '0'
        run: python ./tools/run-tidy.py clang-tidy-18 build/debug
