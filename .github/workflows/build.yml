name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  RELEASE: ${{ github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

jobs:
  M:
    name: Prepare builds
    runs-on: ubuntu-latest
    outputs:
      release: ${{fromJson(env.RELEASE)}}
      matrix: ${{steps.flow.outputs.matrix}}

    steps:
      - name: Bootstrap
        uses: proj-flow-actions/bootstrap@v1
        with:
          cache-prefix: ubuntu-latest
          python-version: "3.12"
          checkout: true
          submodules: false

      - name: Find builds
        id: flow
        run: python ./.flow/flow.py github matrix

  build:
    needs: M
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.github_os }}-${{ matrix.build_type }}-${{ matrix.compiler }}${{ matrix.sanitizer && '-sanitize' || '' }}
      cancel-in-progress: true
    strategy:
      matrix: ${{ fromJson(needs.M.outputs.matrix) }}

    permissions:
      contents: write
      pull-requests: write

    env:
      BUILD_TYPE: ${{ matrix.build_type }}
      CONAN_REVISIONS_ENABLED: 1
      FLOW_COMMAND: python ./.flow/flow.py run -D os=${{ matrix.os }} build_type=${{ matrix.build_type }} compiler=${{ matrix.compiler }} sanitizer=${{ matrix.sanitizer }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ARTIFACT_SUFFIX: ${{ matrix.github_os }}-${{ matrix.build_type }}-${{ matrix.compiler }}${{ matrix.sanitizer && '-sanitize' || '' }}
      CONAN_CACHE: ${{ matrix.github_os }}-${{ matrix.build_type }}-${{ matrix.compiler }}
      RELEASE: ${{needs.M.outputs.release}}

    runs-on: ${{ matrix.github_os }}
    name: ${{ matrix.build_name }}
    outputs:
      release: ${{fromJson(env.RELEASE)}}

    steps:
      #     ######## ##    ## ##     ## #### ########   #######  ##    ## ##     ## ######## ##    ## ########
      #     ##       ###   ## ##     ##  ##  ##     ## ##     ## ###   ## ###   ### ##       ###   ##    ##
      #     ##       ####  ## ##     ##  ##  ##     ## ##     ## ####  ## #### #### ##       ####  ##    ##
      #     ######   ## ## ## ##     ##  ##  ########  ##     ## ## ## ## ## ### ## ######   ## ## ##    ##
      #     ##       ##  ####  ##   ##   ##  ##   ##   ##     ## ##  #### ##     ## ##       ##  ####    ##
      #     ##       ##   ###   ## ##    ##  ##    ##  ##     ## ##   ### ##     ## ##       ##   ###    ##
      #     ######## ##    ##    ###    #### ##     ##  #######  ##    ## ##     ## ######## ##    ##    ##
      - name: Bootstrap
        uses: proj-flow-actions/bootstrap@v1
        with:
          cache-prefix: ${{ matrix.github_os }}
          python-version: "3.12"
          checkout: true
          submodules: true

      - name: Setup Windows
        if: ${{ matrix.windows }}
        uses: proj-flow-actions/setup-windows@v1
        with:
          install-occ: ${{ matrix.build_type == 'Debug' }}

      - name: Setup Ubuntu
        if: ${{ matrix.ubuntu }}
        uses: proj-flow-actions/setup-ubuntu@v1
        with:
          gcc-ppa: ${{ matrix.needs_gcc_ppa }}
          gcc-version: ${{ matrix.gcc_ver }}
          compiler: ${{ matrix.compiler }}

      - name: Install ICU
        if: ${{ matrix.ubuntu }}
        run: |
          sudo apt-get install libicu-dev -y

      - name: Setup Conan
        uses: proj-flow-actions/setup-conan@v1
        with:
          user-directory: ${{ matrix.home }}
          cache-prefix: ${{ env.CONAN_CACHE }}

      #     ########  ########   #######        ## ########  ######  ########
      #     ##     ## ##     ## ##     ##       ## ##       ##    ##    ##
      #     ##     ## ##     ## ##     ##       ## ##       ##          ##
      #     ########  ########  ##     ##       ## ######   ##          ##
      #     ##        ##   ##   ##     ## ##    ## ##       ##          ##
      #     ##        ##    ##  ##     ## ##    ## ##       ##    ##    ##
      #     ##        ##     ##  #######   ######  ########  ######     ##

      - name: Configure
        run: ${{ env.FLOW_COMMAND }} -s Conan,CMake

      - name: Build
        run: ${{ env.FLOW_COMMAND }} -s Build

      - name: Test
        continue-on-error: true
        run: ${{ env.FLOW_COMMAND }} -s Test
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

      - name: Prepare Test Report
        if: always()
        continue-on-error: true
        run: ${{ env.FLOW_COMMAND }} -s GTestToCtrf,MergeCtrfFiles

      - name: Pack
        id: artifacts
        if: ${{ fromJson(env.RELEASE) }}
        run: ${{ env.FLOW_COMMAND }} -s Sign,Pack,SignPackages,StorePackages
        env:
          SIGN_TOKEN: ${{ secrets.SIGN_TOKEN }}

      #     ##     ## ########  ##        #######     ###    ########
      #     ##     ## ##     ## ##       ##     ##   ## ##   ##     ##
      #     ##     ## ##     ## ##       ##     ##  ##   ##  ##     ##
      #     ##     ## ########  ##       ##     ## ##     ## ##     ##
      #     ##     ## ##        ##       ##     ## ######### ##     ##
      #     ##     ## ##        ##       ##     ## ##     ## ##     ##
      #      #######  ##        ########  #######  ##     ## ########

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: "./build/artifacts/test-results/ctrf.json"
          artifact-name: ctrf-report-${{ env.ARTIFACT_SUFFIX }}
          github-report: true
          overwrite-comment: true
          comment-tag: ${{ env.ARTIFACT_SUFFIX }}
          upload-artifact: true
          fetch-previous-results: true
          pull-request-report: true

      - name: Upload packages
        uses: actions/upload-artifact@v7
        if: ${{ steps.artifacts.outputs.CPACK_GENERATORS != '' }}
        with:
          name: _packages-${{ env.ARTIFACT_SUFFIX }}
          path: ${{github.workspace}}/build/artifacts/packages/
          if-no-files-found: ignore

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: _coverage-${{ env.ARTIFACT_SUFFIX }}
          path: ${{github.workspace}}/build/artifacts/coverage/
          if-no-files-found: ignore

  coveralls-done:
    name: Finalize coverage reporting
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write

    steps:
      - name: Bootstrap
        if: always()
        uses: proj-flow-actions/bootstrap@v1
        with:
          cache-prefix: ubuntu-latest
          python-version: "3.12"
          checkout: true
          submodules: false

      - name: Download coverage
        uses: actions/download-artifact@v7
        if: always()
        with:
          pattern: _coverage-*
          path: ${{github.workspace}}/build/artifacts/coverage/

      - name: Finalize Coveralls
        id: finalize
        if: always()
        run: |
          python ./.flow/flow.py coveralls --done "${{ github.run_id }}"
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup comments
        if: always()
        run: |
          python ./.flow/flow.py github comments --current-run "${{ github.run_number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge coverage
        uses: actions/upload-artifact/merge@v7
        if: ${{fromJson(steps.finalize.outputs.has_coverage)}}
        with:
          name: Coverage
          pattern: _coverage-*
          delete-merged: true

  merge:
    name: Merge artifacts
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE: ${{needs.build.outputs.release}}
    outputs:
      release: ${{fromJson(env.RELEASE)}}

    steps:
      - name: Merge packages
        uses: actions/upload-artifact/merge@v7
        if: ${{ fromJson(env.RELEASE) }}
        with:
          name: Packages
          pattern: _packages-*
          delete-merged: true

  publish:
    name: Upload packages
    if: ${{ fromJson(needs.merge.outputs.release) }}
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      RELEASE: ${{needs.merge.outputs.release}}

    steps:
      - name: Bootstrap
        uses: proj-flow-actions/bootstrap@v1
        with:
          cache-prefix: ubuntu-latest
          python-version: "3.12"
          checkout: true
          submodules: false

      - name: Get packages
        uses: actions/download-artifact@v7
        with:
          name: Packages
          path: ${{github.workspace}}/build/download/packages

      - name: Publish the release
        run: python ./.flow/flow.py github publish --upload "${{github.workspace}}/build/download/packages"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
